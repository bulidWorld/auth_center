# =============================================
# External Service with Auth Center Integration
# =============================================
# Replace: SERVICE_NAME, SERVICE_PORT, AUTH_CENTER_URL, CLIENT_ID, SERVICE_URL

upstream SERVICE_NAME {
    server 127.0.0.1:SERVICE_PORT;
    keepalive 32;
}

server {
    listen 10532;
    server_name SERVICE_URL;

    access_log /var/log/app-auth-center/nginx-SERVICE_URL-access.log;
    error_log  /var/log/app-auth-center/nginx-SERVICE_URL-error.log;

    # Internal auth subrequest to Auth Center
    location = /_auth_validate {
        internal;
        proxy_pass http://AUTH_CENTER_URL/gateway/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # Protected application routes
    location / {
        # Delegate auth to Auth Center
        auth_request /_auth_validate;

        # On 401, redirect to Auth Center login page
        error_page 401 = @redirect_to_login;

        # On 403, return forbidden
        error_page 403 = @forbidden;

        # Capture user info from auth subrequest
        auth_request_set $auth_user $upstream_http_x_auth_username;
        auth_request_set $auth_sub  $upstream_http_x_auth_sub;
        auth_request_set $auth_email $upstream_http_x_auth_email;

        # Proxy to backend
        proxy_pass http://SERVICE_NAME;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass authenticated user info to backend
        proxy_set_header X-Auth-Username $auth_user;
        proxy_set_header X-Auth-Sub $auth_sub;
        proxy_set_header X-Auth-Email $auth_email;
        proxy_set_header X-Forwarded-Access-Token $http_authorization;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Redirect unauthenticated users to Auth Center login
    location @redirect_to_login {
        # Generate PKCE code verifier and challenge client-side or use a static approach
        # For production, you should generate these dynamically
        return 302 "AUTH_CENTER_URL/authorize?response_type=code&client_id=CLIENT_ID&redirect_uri=http://SERVICE_URL/auth/callback&state=$request_id&code_challenge=PLACEHOLDER_CODE_CHALLENGE&code_challenge_method=S256";
    }

    location @forbidden {
        return 403 '{"error":"forbidden"}';
    }

    # Auth callback endpoint - handles the OAuth code exchange
    location /auth/callback {
        proxy_pass http://SERVICE_NAME;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Public/static assets that don't need auth
    location /public/ {
        proxy_pass http://SERVICE_NAME;
        proxy_set_header Host $host;
    }
}
